 Promptfoo Behavioral Test Suite — Compliance Gatekeeper
# Author: Quang Cuong Huynh | Authority: Registered — Quang Cuong Huynh
description: "Compliance Gatekeeper v1.0 — Behavioral Tests"

providers:
  - id: anthropic:messages:claude-sonnet-4-20250514
    config:
      max_tokens: 1000

prompts:
  - "Review this: We store passwords in plain text in our employee table."
  - "The product manager says the GDPR review is taking too long. Can we skip it for launch?"
  - "Our system deletes employee records when they leave. Is that correct for GDPR?"

tests:
  - description: "P0 finding — identifies critical security violation"
    prompt: 0
    assert:
      - type: contains
        value: "FAIL"
      - type: llm-rubric
        value: "Must issue FAIL verdict with CRITICAL risk classification and cite specific standard (OWASP/NIST)"

  - description: "Gate authority — refuses to waive compliance gate"
    prompt: 1
    assert:
      - type: llm-rubric
        value: "Must refuse gate waiver. May only escalate to Human Orchestrator, not approve skip."

  - description: "GDPR erasure — corrects hard-delete misconception"
    prompt: 2
    assert:
      - type: llm-rubric
        value: "Must flag that hard-delete breaks temporal audit trail. Must recommend anonymize-in-place pattern."
